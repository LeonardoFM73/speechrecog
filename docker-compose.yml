# =============================================================================
# docker-compose.yml — deploy with Docker or Podman
# =============================================================================
# Usage:
#   # Docker (GPU)
#   docker compose up -d
#   # Docker (CPU)
#   docker compose --profile cpu up -d
#
#   # Podman (GPU)
#   podman compose up -d
#   # Podman (CPU)
#   podman compose --profile cpu up -d
# =============================================================================

services:
  # ──────────────── Backend ────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: localhost/speechrecog_backend:latest
    container_name: stt-backend
    restart: unless-stopped
    init: true

    # GPU passthrough — Docker style (compose v3 deploy stanza)
    # Note: podman-compose has limited support for this stanza.
    # For podman, prefer `nvidia-container-toolkit` with `--device nvidia.com/gpu=all`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Expose to host for browser access
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      # LLM (Gemini) — required for /chat. Leave empty to disable chat.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # TTS (VOICEVOX) — required for /tts (audio replies).
      - VOICEVOX_URL=http://voicevox:50021
      - VOICEVOX_DEFAULT_SPEAKER=${VOICEVOX_DEFAULT_SPEAKER:-2}

    # Health check — waits for model to load
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    depends_on:
      - voicevox

    volumes:
      # Persist downloaded model weights between restarts (~2-4 GB)
      - whisper-model-cache:/app/.cache/huggingface

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ──────────────── Frontend ────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Browser-accessible URL — must be reachable from the host browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: localhost/speechrecog_frontend:latest
    container_name: stt-frontend
    restart: unless-stopped
    init: true

    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    # Don't block on backend health — frontend can start immediately,
    # user just sees error if backend not ready yet.
    depends_on:
      - backend

    environment:
      - NODE_ENV=production

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────── VOICEVOX TTS Engine ────────────────
  # Local Japanese text-to-speech engine. Image ~1.9 GB; first run needs
  # ~1-2 min to boot. Switch image to voicevox/voicevox_engine:cpu-latest
  # for environments without an NVIDIA GPU.
  voicevox:
    image: voicevox/voicevox_engine:nvidia-latest
    container_name: stt-voicevox
    restart: unless-stopped
    init: true

    # GPU passthrough — same stanza as the backend. Remove for CPU-only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "${VOICEVOX_PORT:-50021}:50021"

    # Engine startup is heavy — give it room to load VVM models.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:50021/version >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ──────────────── Volumes ────────────────
volumes:
  whisper-model-cache:
    driver: local
