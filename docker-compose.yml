# =============================================================================
# docker-compose.yml — deploy with Docker or Podman
# =============================================================================
# Usage:
#   # Docker (GPU)
#   docker compose up -d
#   # Docker (CPU)
#   docker compose --profile cpu up -d
#
#   # Podman (GPU)
#   podman compose up -d
#   # Podman (CPU)
#   podman compose --profile cpu up -d
# =============================================================================

services:
  # ──────────────── Backend ────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: localhost/speechrecog_backend:latest
    container_name: stt-backend
    restart: unless-stopped
    init: true

    # GPU passthrough — Docker style (compose v3 deploy stanza)
    # Note: podman-compose has limited support for this stanza.
    # For podman, prefer `nvidia-container-toolkit` with `--device nvidia.com/gpu=all`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Expose to host for browser access
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      # LLM (OpenAI-compatible) — required for /chat. Leave empty to disable chat.
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://10.100.101.12:5091/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen35-9b}
      # TTS (VOICEVOX on LAN host) — required for /tts (audio replies).
      - VOICEVOX_URL=http://${VOICEVOX_HOST:-10.100.101.12}:${VOICEVOX_PORT:-50021}
      - VOICEVOX_DEFAULT_SPEAKER=${VOICEVOX_DEFAULT_SPEAKER:-2}
      # Sessions — MongoDB connection (defaults to compose service `mongo`).
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-speechrecog}

    # Health check — waits for model to load
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    # MongoDB must be reachable before backend starts.
    depends_on:
      mongo:
        condition: service_healthy

    volumes:
      # Persist downloaded model weights between restarts (~2-4 GB)
      - whisper-model-cache:/app/.cache/huggingface

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ──────────────── Frontend ────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Browser-accessible URL — must be reachable from the host browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: localhost/speechrecog_frontend:latest
    container_name: stt-frontend
    restart: unless-stopped
    init: true

    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    # Don't block on backend health — frontend can start immediately,
    # user just sees error if backend not ready yet.
    depends_on:
      - backend

    environment:
      - NODE_ENV=production

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Note: VOICEVOX runs on LAN host (not in compose).
  # Adjust VOICEVOX_HOST/PORT in .env to match.

  # ──────────────── MongoDB (session persistence) ────────────────
  mongo:
    image: mongo:7
    container_name: stt-mongo
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ──────────────── Volumes ────────────────
volumes:
  whisper-model-cache:
    driver: local
  mongo-data:
    driver: local
